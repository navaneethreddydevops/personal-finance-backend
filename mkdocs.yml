site_name: Personal Finance API
site_description: REST API for personal finance management — authentication, accounts, and transactions.
site_url: https://navaneethreddydevops.github.io/personal-finance-backend/
repo_url: https://github.com/navaneethreddydevops/personal-finance-backend
repo_name: navaneethreddydevops/personal-finance-backend
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Guides:
      - Getting Started: guides/getting-started.md
      - Authentication: guides/authentication.md
  - API Reference:
      - Configuration: api/config.md
      - Security: api/security.md
      - Models: api/models.md
      - Schemas: api/schemas.md
      - Services: api/services.md
      - Dependencies: api/deps.md
